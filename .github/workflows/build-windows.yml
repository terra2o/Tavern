name: Windows Build
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v3

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pdcurses

      - name: Prepare PDCurses header
        run: |
          set -e
          hdr=/mingw64/include/pdcurses.h
          if [ ! -f "$hdr" ]; then
            echo "pdcurses.h wrapper not found at $hdr" >&2
            find /mingw64/include -iname '*curses*' >&2
            exit 1
          fi
          cp "$hdr" include/curses.h

      - name: Build
        run: mingw32-make release CURSES_LIB=-lpdcurses_wincon

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: ./bin/tavern.exe
